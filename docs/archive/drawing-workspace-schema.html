<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing Workspace — Schema</title>
<style>
  :root{
    --bg:#14161a; --bg2:#191c22; --card:#1e222a; --card2:#232831;
    --line:#2c323d; --line2:#39414f;
    --ink:#e8ebf0; --ink2:#aab2c0; --ink3:#727c8c;
    --entity:#e0863c; --value:#5b9bd5; --reference:#5cb87a; --service:#a779d6; --render:#d4af40;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px}

  header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg2),var(--bg));position:sticky;top:0;z-index:20}
  .head-inner{padding:18px 0 14px}
  .titlerow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  h1{font-size:19px;font-weight:650;letter-spacing:-.01em}
  .ver{font-family:var(--mono);font-size:11px;color:var(--ink3);border:1px solid var(--line2);padding:2px 7px;border-radius:5px}
  .sub{color:var(--ink2);font-size:13px;margin-top:5px;max-width:760px}
  .pairs{color:var(--ink3);font-size:11.5px;font-family:var(--mono);margin-top:7px}

  /* pipeline signature */
  .pipe{display:flex;align-items:center;gap:0;margin-top:14px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px}
  .pseg{display:flex;align-items:center;gap:0}
  .pnode{padding:4px 9px;border:1px solid var(--line2);border-radius:5px;color:var(--ink2);white-space:nowrap;background:var(--card)}
  .pnode.here{border-color:var(--value);color:var(--value);box-shadow:0 0 0 1px rgba(91,155,213,.25) inset}
  .parrow{color:var(--ink3);padding:0 7px}

  .controls{display:flex;align-items:center;gap:10px;padding:14px 0;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .legend{display:flex;gap:14px;flex-wrap:wrap}
  .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);font-family:var(--mono)}
  .dot{width:9px;height:9px;border-radius:2px}
  .spacer{flex:1}
  .btn{background:var(--card);border:1px solid var(--line2);color:var(--ink2);font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:6px;cursor:pointer}
  .btn:hover{border-color:var(--ink3);color:var(--ink)}
  .tabs{display:flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
  .tab{background:var(--card);border:none;color:var(--ink2);font-family:var(--mono);font-size:11px;padding:6px 13px;cursor:pointer}
  .tab.on{background:var(--card2);color:var(--ink)}

  .grouphdr{display:flex;align-items:baseline;gap:11px;margin:30px 0 4px}
  .gnum{font-family:var(--mono);font-size:11px;color:var(--ink3)}
  .gttl{font-size:15px;font-weight:600}
  .gdesc{color:var(--ink2);font-size:12.5px;margin-bottom:14px;max-width:820px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .card-top{padding:13px 15px 11px;border-bottom:1px solid var(--line)}
  .ct-row{display:flex;align-items:center;gap:9px}
  .stripe{width:3px;align-self:stretch;border-radius:3px;min-height:18px}
  .cname{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:-.01em}
  .stereo{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:4px;margin-left:auto}
  .purpose{color:var(--ink2);font-size:12.5px;margin-top:9px}
  .card-body{padding:12px 15px;flex:1}
  .flds{list-style:none;display:flex;flex-direction:column;gap:0}
  .fld{display:flex;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:12px}
  .fld:last-child{border-bottom:none}
  .fk{font-family:var(--mono);color:var(--ink);min-width:118px;font-size:11.5px}
  .fv{font-family:var(--mono);color:var(--ink3);font-size:11.5px}
  .note{margin-top:11px;padding:9px 11px;background:var(--bg2);border-left:2px solid var(--line2);border-radius:0 6px 6px 0;font-size:11.5px;color:var(--ink2)}
  .note b{color:var(--ink)}
  .xref{font-family:var(--mono);font-size:10.5px;color:var(--reference);margin-top:9px;display:flex;align-items:center;gap:6px}
  .raw{font-family:var(--mono);font-size:11px;color:var(--ink2);background:#101216;border-top:1px solid var(--line);padding:11px 14px;white-space:pre-wrap;display:none}
  .raw.show{display:block}
  .rawtoggle{font-family:var(--mono);font-size:10px;color:var(--ink3);cursor:pointer;padding:7px 15px;border-top:1px solid var(--line)}
  .rawtoggle:hover{color:var(--ink2)}

  #json{display:none}
  #jsonOut{font-family:var(--mono);font-size:12px;color:var(--ink2);background:#101216;border:1px solid var(--line);border-radius:10px;padding:18px;white-space:pre;overflow-x:auto;margin:18px 0 60px;line-height:1.55}

  footer{border-top:1px solid var(--line);margin-top:50px;padding:22px 0 50px;color:var(--ink3);font-size:11.5px}
  .key-insight{background:linear-gradient(135deg,rgba(167,121,214,.08),rgba(91,155,213,.05));border:1px solid var(--line2);border-radius:10px;padding:15px 17px;margin:18px 0;font-size:13px;color:var(--ink)}
  .key-insight b{color:var(--service)}
  @media(max-width:560px){.grid{grid-template-columns:1fr}.fk{min-width:96px}}
</style>
</head>
<body>

<header>
  <div class="wrap head-inner">
    <div class="titlerow">
      <h1>Drawing Workspace</h1>
      <span class="ver" id="verPill"></span>
    </div>
    <div class="sub" id="subTxt"></div>
    <div class="pairs" id="pairsTxt"></div>
    <div class="pipe" id="pipe"></div>
  </div>
</header>

<div class="wrap">
  <div class="controls">
    <div class="legend" id="legend"></div>
    <div class="spacer"></div>
    <button class="btn" id="rawAll" onclick="toggleAllRaw()">Show all raw</button>
    <button class="btn" onclick="copyAll()">Copy full schema</button>
    <div class="tabs">
      <button class="tab on" data-v="browse" onclick="setView('browse')">Browse</button>
      <button class="tab" data-v="json" onclick="setView('json')">Schema JSON</button>
    </div>
  </div>

  <div class="key-insight" id="thesis"></div>

  <div id="browse"></div>
  <div id="json"><pre id="jsonOut"></pre></div>
</div>

<footer><div class="wrap" id="foot"></div></footer>

<script>
/* =========================================================================
   ONE SOURCE OF TRUTH — human cards + machine contract render from this.
   This schema captures the DRAWING WORKSPACE: the input layer that sits
   UPSTREAM of the geometry kernel. It produces Volume.profile + PushPullOp;
   it does not redefine kernel/solver/materials types — those are cross-refs.

   DRY thesis: the 13 SketchUp-style tools are NOT 13 classes. They are one
   ToolRunner state machine + a ToolDefinition catalog (flyweight). A tool is
   data: a list of stages, each with a constraint and a measurement grammar.
   ========================================================================= */
const COLORS={entity:"var(--entity)",value:"var(--value)",reference:"var(--reference)",service:"var(--service)",render:"var(--render)"};
const STEREO_LABEL={entity:"Entity",value:"Value Obj",reference:"Reference",service:"Service",render:"Render"};

const MODEL={
  meta:{
    schema:"drawing-workspace",
    version:"0.1.0",
    units:"integer ticks @ 1/32in. Screen-space tolerances in px; results resolve to ticks.",
    pairsWith:"geometry-kernel@0.x (Volume, Face, PushPullOp) · framing-solver@0.1 · materials-schema@0.x",
    scope:"v0.1 — plane-locked sketching, a domain fit (not a cut): residential framing is plane-aligned. One 3D scene; ortho cameras for locked views, one perspective view. Sloped roofs, bracing, stringers all express on a face-derived or section SketchPlane. Free 3D edges parked until a geometry type appears that no plane can express.",
    derivation:"one-way: viewport+camera -> cursor+inference -> tool -> SketchPlane lift -> Volume.profile/PushPullOp -> kernel"
  },
  pipeline:["viewport+camera","cursor+inference","tool stage","SketchPlane lift","kernel op","framing solver"],
  thesis:"Tools are <b>data, not code</b>. Line, Rectangle, Circle, Push/Pull, Move, Rotate, Offset, Follow&nbsp;Me — all run one loop: <i>pick (snapped) → constrained move (locked) → commit or type a value → emit op</i>. They differ only in stage count, constraint, and measurement grammar. One <b>ToolRunner</b> + a <b>ToolDefinition</b> catalog (flyweight, like LumberSpec) replaces 13 bespoke tools.",
  groups:[
    {
      n:"A", title:"View & Navigation", color:"entity",
      desc:"How you look. Plan and elevations are orthographic cameras locked to a world axis; perspective is the one true 3D camera. Same scene graph behind all of them — locked views are not a separate 2D renderer.",
      types:[
        {name:"Viewport",stereo:"entity",purpose:"A screen region with its own camera and allowed interactions. Widescreen layouts hold up to 4. Exactly one is active and drives the SketchPlane.",
          fields:[["id","uuid"],["viewType","ViewType"],["camera","Camera"],["region","rect (px, in layout)"],["active","bool — only one true"]],
          note:"The <b>active</b> viewport is the input focus. Switching active viewport is what re-targets where geometry lands."},
        {name:"ViewType",stereo:"value",purpose:"Enumerates the fixed orientations plus free perspective. Locked types disable orbit.",
          fields:[["kind","perspective | top | front | back | left | right"],["lockedAxis","X|Y|Z | null (perspective)"],["allowsOrbit","bool (perspective only)"]],
          note:"top→spans XY · front/back→XZ · left/right→YZ. A locked view's U/V <b>are</b> its plane's two spanning axes."},
        {name:"Camera",stereo:"entity",purpose:"Eye/target/up plus projection. Ortho for locked views (no perspective divide); perspective only where it earns its cost.",
          fields:[["projection","orthographic | perspective"],["eye","vec3"],["target","vec3"],["up","vec3"],["nav","NavigationState"]],
          note:"Locked-view picking degenerates to an <b>exact affine inverse</b> — no fuzzy raycast. Special-case the pick math, keep one scene."},
        {name:"NavigationState",stereo:"value",purpose:"Pan/zoom for every view; orbit for perspective only. Transient view state, persisted per viewport for saved layouts.",
          fields:[["zoom","scalar"],["pan","vec2 (screen)"],["orbit","quat | null (locked)"]]},
        {name:"ViewportLayout",stereo:"value",purpose:"Widescreen arrangement of 1–4 viewports. Saveable so a user's quad-split or perspective+elevations stack persists.",
          fields:[["regions","Viewport[] (≤4)"],["preset","single | dual | triple | quad | custom"]]}
      ]
    },
    {
      n:"B", title:"Space & Reference", color:"value",
      desc:"Where geometry lives. 3D world talks in planes (XY/XZ/YZ) and axes (X/Y/Z). 2D view space talks in axes only (U/V, no Z). SketchPlane is the bridge: a 2D (U,V) pair IS a 3D plane's two spanning axes.",
      types:[
        {name:"CoordinateFrame",stereo:"value",purpose:"The global origin + X/Y/Z basis. The reference everything ultimately snaps to.",
          fields:[["origin","vec3 (0,0,0)"],["axes","{X,Y,Z} unit vec3"]],
          note:"Convention: X=red, Y=green, Z=blue (up). Inference 'axis lock' resolves against these in 3D, against U/V in a locked view."},
        {name:"Plane",stereo:"value",purpose:"An oriented plane in 3D world space. Named by its two spanning axes (XY/XZ/YZ) or derived from a face normal.",
          fields:[["origin","vec3"],["basisAxes","[X|Y|Z, X|Y|Z] or face-derived"],["normal","vec3 (basis cross)"]],
          note:"A <b>noun for a thing in the world</b>. A face promotes to a Plane; you snap <i>along</i> an axis. Don't overload the two words."},
        {name:"SketchPlane",stereo:"entity",purpose:"The active drawing surface = the face under the cursor, or the ground datum for the first sketch. Exposes local U/V so 2D picks lift to 3D exactly.",
          fields:[["plane","Plane"],["axisU","vec3 (local 2D x)"],["axisV","vec3 (local 2D y)"],["source","face:uuid | groundDatum"]],
          note:"The universal bridge. lift(u,v) = origin + u·axisU + v·axisV. Plane-locked ⇒ zero depth ambiguity — depth comes from the face."},
        {name:"PickRay",stereo:"value",purpose:"Screen point → world ray. Only the perspective view needs a true raycast; in a locked ortho view this collapses to a 2D inverse-transform.",
          fields:[["origin","vec3"],["dir","vec3"],["screenPt","vec2 (px)"],["degenerate","bool — true in locked ortho"]]}
      ]
    },
    {
      n:"C", title:"Inference & Snapping", color:"service",
      desc:"The brain. One engine, written once in 3D, collapses to 2D for free under plane-lock. Charged reference points emit NEW snap candidates — anchors are a source, not just raw geometry.",
      types:[
        {name:"InferenceEngine",stereo:"service",purpose:"Per-frame: takes pick + nearby geometry + active anchors/locks → best ranked SnapTarget. Recomputed every frame, never stored.",
          fields:[["resolve(pick,ctx)","→ InferenceResult"],["candidates","SnapTarget[] (ranked)"],["priority","arbitration order"],["consumes","geometry + ReferenceAnchor[] + InferenceLock"]],
          note:"Anchors feed back in: a charged midpoint emits from-point-along-axis guides, linear extension, perpendicular-from. Treat anchors as candidate <b>sources</b>."},
        {name:"SnapTarget",stereo:"value",purpose:"One snap kind the engine can lock to. The full set the cursor recognizes.",
          fields:[["kind","endpoint | midpoint | center | intersection | onEdge | onFace | vertex | guideX | origin | onAxis | division"],["point","vec3 (resolved to tick)"],["host","edge|face|guide ref"]],
          note:"Arbitration when several fall inside tolerance: vertex > midpoint > center > intersection > onEdge > onFace. Explicit, so snapping never feels random."},
        {name:"InferenceResult",stereo:"value",purpose:"What the cursor locked onto this frame + why. Drives the on-screen glyph/color. Transient.",
          fields:[["target","SnapTarget"],["screenGlyph","dot|x|square|diamond"],["color","by kind"],["provenance","SnapProvenance"]],
          note:"Never persisted. The persisted echo of this is SnapProvenance, written only at commit."},
        {name:"ReferenceAnchor",stereo:"value",purpose:"A 'charged' point — hover a snap to arm it without placing a vertex. Carries the direction its host edge implies, enabling distance-from-anchor input.",
          fields:[["point","vec3"],["impliedDir","vec3 | null (edge dir)"],["host","SnapTarget"],["charged","bool"]],
          note:"Your distance feature: hover midpoint → arm anchor → edge supplies impliedDir → type d → place at anchor + impliedDir·d. Sign from cursor side."},
        {name:"InferenceLock",stereo:"value",purpose:"A snap or direction held so it survives cursor movement (hold key / arrow key). The primitive behind axis-lock AND reference-distance.",
          fields:[["kind","direction | axis | plane | point"],["constraint","line|axis|plane to project onto"],["heldVia","shiftHold | arrowKey | typed"]],
          note:"Build once. Reference-distance, axis-lock (←X →Y ↑Z / U,V), and 'lock to this edge' are all consumers of the same lock."},
        {name:"SnapSettings",stereo:"value",purpose:"User-configurable tolerances and behavior. Tolerance is screen-space px, so zooming in buys precision for free.",
          fields:[["tolerancePx","per-kind px radius (point tighter than axis)"],["priority","SnapTarget order + tie-break"],["angleSnap","deg increment | off"],["grid","tick | off"]],
          note:"Pixel-defined, not world-defined. Result still resolves to world ticks (1/32\")."}
      ]
    },
    {
      n:"D", title:"Input & Measurement", color:"reference",
      desc:"One modal buffer, interpreted per tool stage. Not a per-tool input box — the active tool's current stage owns the grammar.",
      types:[
        {name:"ValueInput",stereo:"value",purpose:"The single modal text buffer (SketchUp's Measurements box). Opens on keypress mid-operation; the active tool stage parses it.",
          fields:[["buffer","string (live)"],["interpretedBy","current ToolStage"],["committed","bool — Enter"]],
          note:"Generic. Same buffer feeds distance, W×H, radius, angle, segment-count, array-count. Never build per-tool input widgets."},
        {name:"MeasurementGrammar",stereo:"reference",purpose:"Flyweight parse rules a stage points at. Defines tokens, separators, suffixes. Shared across tools that take the same kind of value.",
          fields:[["id","key (e.g. 'lengthDir','wxh','radiusSeg')"],["pattern","token spec, e.g. d | w,h | r | Ns | angle"],["resolver","(tokens, ctx) → op params"]],
          note:"Looked up by key, never copied per stage. 'Ns' (e.g. 10s) sets segment count; 'w,h' sets rectangle extents; bare number = primary scalar."}
      ]
    },
    {
      n:"E", title:"Tools — the DRY core", color:"render",
      desc:"The payoff. 13 SketchUp tools become one runner + a config catalog. A tool is a sequence of stages; each stage declares what it picks, what it constrains, and which measurement grammar it accepts.",
      types:[
        {name:"Tool",stereo:"entity",purpose:"The active editing mode. Holds a definition + live runner state. Selecting a tool loads its ToolDefinition; it does not swap code.",
          fields:[["definition","ToolDefinition (flyweight)"],["stageIndex","int — current step"],["anchors","ReferenceAnchor[] collected"],["picks","vec3[] committed so far"],["lock","InferenceLock | null"]],
          note:"Runner is generic. State = where you are in the definition's stage list + what you've picked/locked. One class runs Line and Follow&nbsp;Me alike."},
        {name:"ToolStage",stereo:"value",purpose:"One step of a tool: a prompt, what it picks, the constraint it imposes while moving, and the grammar its ValueInput accepts.",
          fields:[["prompt","string ('pick start', 'set bulge'…)"],["picks","point | face | edge | direction | path"],["constraint","free | onPlane | alongAxis | alongEdge | radial | alongPath"],["grammar","MeasurementGrammar.id"],["emitsOnLast","DrawOp kind | null"]],
          note:"Push/Pull = [pick face, drag-alongNormal + length]. Rectangle = [pick corner, pick opposite + 'w,h']. Follow&nbsp;Me = [pick profile face, pick <b>path</b>] → sweep. Same shape, different rows."},
        {name:"ToolDefinition",stereo:"reference",purpose:"Flyweight catalog entry per tool. Pure data — the stage list + emitted op + cursor. Add a tool by adding a row, not a class.",
          fields:[["id","line|rect|rotRect|circle|polygon|arc2|arc3|pie|freehand|pushpull|move|rotate|followme|offset|scale"],["stages","ToolStage[]"],["produces","DrawOp kind"],["hotkey","char"]],
          note:"<b>Tools are data.</b> Same pattern as LumberSpec/SupplierSku: a shared catalog looked up by key, never instantiated per use."},
        {name:"DrawOp",stereo:"value",purpose:"The committed result a tool emits — the contract handed to the geometry kernel. Lifted to 3D via the active SketchPlane.",
          fields:[["kind","addEdge | addProfile | pushPull | sweep | move | rotate | offset"],["payload","points/profile/delta/path in world ticks"],["plane","SketchPlane used"],["targets","Face|Edge|Volume refs"]],
          note:"This is the boundary. Workspace stops here; kernel consumes DrawOp → mutates Volume → re-solves framing. One-way. <b>sweep</b> ≠ move: Follow&nbsp;Me generates solid along a path; Move only translates. The <b>path</b> pick kind generalizes to any future sweep tool."},
      ]
    },
    {
      n:"F", title:"Construction & Provenance", color:"value",
      desc:"Two cheap-now, expensive-later decisions. Guides must never reach the framing solver; placed vertices should remember what they snapped to.",
      types:[
        {name:"ConstructionGeometry",stereo:"entity",purpose:"Tape-measure / protractor output: guide lines and points that exist ONLY to snap to. A distinct class so it never promotes to building geometry.",
          fields:[["id","uuid"],["kind","guideLine | guidePoint | guideAxis"],["geom","infinite line | point | ray"],["promotable","false (hard)"]],
          note:"Must NOT become a Volume or reach the solver. Otherwise your stud count inherits phantom geometry. Separate class makes the violation impossible."},
        {name:"SnapProvenance",stereo:"value",purpose:"Written on a committed vertex: what it snapped to, not just where. The seed of associativity later.",
          fields:[["target","SnapTarget kind"],["host","edge|face|vertex ref"],["param","t along edge | offset"],["anchorChain","ReferenceAnchor[] used"]],
          note:"Cheap now, the whole door to <b>parametric follow</b> later (edge moves → dependent point follows). Skip it and you can never add it cleanly."}
      ]
    }
  ],
  crossRefs:[
    {from:"DrawOp",to:"geometry-kernel: Volume.profile, PushPullOp",why:"workspace emits, kernel consumes"},
    {from:"SketchPlane.source",to:"geometry-kernel: Face",why:"draw-on-face reorients the active plane"},
    {from:"projectToPlane(plane) — shared primitive",to:"lives low (geometry-kernel/shared util)",why:"pure 3D→U/V projection. Locked-view DISPLAY calls it cheap (silhouette/edges). Only coupling the workspace needs."},
    {from:"drawings@0.x — SEPARATE downstream schema (not a workspace type)",to:"permittable plans/elevations/sections, sheets, title blocks",why:"terminal consumer parallel to the framing solver. Owns hidden-line removal, line weights, dimensions, National CAD Standard. Kept out of the input layer to preserve one-way derivation."}
  ],
  resolved:[
    "Projection — split. projectToPlane is a tiny shared primitive (low, in kernel/util) feeding cheap locked-view display; the heavy deliverable (hidden-line, dims, weights, sheets, NCS) is a SEPARATE downstream 'drawings' schema, not a workspace type. Workspace already shares Plane — all the coupling it needs.",
    "Free 3D edges — parked as a domain fit, not a v1 cut. Sloped roofs → inclined SketchPlane; bracing → line on wall-face plane; stringers → section plane. Revisit only when a real geometry type can't be expressed on any plane.",
    "Follow Me — its own pick kind, not a degenerate Move. Adds 'path' to ToolStage.picks and 'sweep' to DrawOp; still runs on the generic runner, no special-case tool. Low priority for framing (trim/gutters/foundation, not studs) — catalog row, stubbed."
  ],
  openQuestions:[
    "'drawings' schema is the next deliverable fork — model it when document generation becomes active. Out of scope for the workspace layer."
  ]
};

/* ---------- render ---------- */
function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}

document.getElementById('verPill').textContent=MODEL.meta.schema+" @ "+MODEL.meta.version;
document.getElementById('subTxt').textContent=MODEL.meta.scope;
document.getElementById('pairsTxt').textContent="pairs with — "+MODEL.meta.pairsWith;
document.getElementById('thesis').innerHTML=MODEL.thesis;

// pipeline
const pipe=document.getElementById('pipe');
MODEL.pipeline.forEach((p,i)=>{
  const seg=el('div','pseg');
  const here=(p==="tool stage"||p==="SketchPlane lift"||p==="cursor+inference"||p==="viewport+camera");
  seg.appendChild(el('div','pnode'+(here?' here':''),p));
  if(i<MODEL.pipeline.length-1)seg.appendChild(el('span','parrow','→'));
  pipe.appendChild(seg);
});

// legend
const legend=document.getElementById('legend');
Object.keys(COLORS).forEach(k=>{
  const lg=el('div','lg');
  const d=el('span','dot');d.style.background=COLORS[k];
  lg.appendChild(d);lg.appendChild(el('span',null,STEREO_LABEL[k]));
  legend.appendChild(lg);
});

// cards
const browse=document.getElementById('browse');
MODEL.groups.forEach(g=>{
  const hdr=el('div','grouphdr');
  hdr.appendChild(el('span','gnum',g.n));
  hdr.appendChild(el('span','gttl',g.title));
  browse.appendChild(hdr);
  browse.appendChild(el('div','gdesc',g.desc));
  const grid=el('div','grid');
  g.types.forEach(t=>{
    const col=COLORS[t.stereo];
    const card=el('div','card');
    // top
    const top=el('div','card-top');
    const row=el('div','ct-row');
    const stripe=el('div','stripe');stripe.style.background=col;
    row.appendChild(stripe);
    row.appendChild(el('div','cname',t.name));
    const st=el('div','stereo',STEREO_LABEL[t.stereo]);
    st.style.color=col;st.style.background='color-mix(in srgb,'+col+' 14%, transparent)';
    row.appendChild(st);
    top.appendChild(row);
    top.appendChild(el('div','purpose',t.purpose));
    card.appendChild(top);
    // body
    const body=el('div','card-body');
    const ul=el('ul','flds');
    t.fields.forEach(f=>{
      const li=el('li','fld');
      li.appendChild(el('span','fk',f[0]));
      li.appendChild(el('span','fv',f[1]));
      ul.appendChild(li);
    });
    body.appendChild(ul);
    if(t.note)body.appendChild(el('div','note',t.note));
    card.appendChild(body);
    // raw
    const raw=el('pre','raw',JSON.stringify(t,null,2));
    const tog=el('div','rawtoggle','{ } raw');
    tog.onclick=()=>raw.classList.toggle('show');
    card.appendChild(tog);card.appendChild(raw);
    grid.appendChild(card);
  });
  browse.appendChild(grid);
});

// json
document.getElementById('jsonOut').textContent=JSON.stringify(MODEL,null,2);

// footer
document.getElementById('foot').innerHTML=
  "units — "+MODEL.meta.units+"<br>derivation — "+MODEL.meta.derivation+
  "<br><br><span style='color:var(--reference)'>resolved</span><br>"+MODEL.resolved.map(q=>"✓ "+q).join("<br>")+
  "<br><br><span style='color:var(--ink2)'>open</span><br>"+MODEL.openQuestions.map(q=>"• "+q).join("<br>");

// controls
let allRaw=false;
function toggleAllRaw(){allRaw=!allRaw;document.querySelectorAll('.raw').forEach(r=>r.classList.toggle('show',allRaw));document.getElementById('rawAll').textContent=allRaw?'Hide all raw':'Show all raw';}
function setView(v){document.getElementById('browse').style.display=v==='browse'?'block':'none';document.getElementById('json').style.display=v==='json'?'block':'none';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));}
function copyAll(){navigator.clipboard.writeText(JSON.stringify(MODEL,null,2));}
</script>
</body>
</html>
