# Rust workspace root (virtual manifest).
#
# Domain-context crates land in Phase 2+ of docs/plans/repo-scaffold.md:
#   crates/geometry-kernel, crates/reference-data, crates/materials, ...
# Phase 1 is the spine only, so the member list is intentionally empty.
[workspace]
resolver = "3"
members = []

[workspace.package]
edition = "2024"
license = "UNLICENSED"
publish = false

[profile.release]
lto = "thin"
codegen-units = 1
